<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anyblog</title>
  <meta name="description" content="Discover a random blog from the Hacker News community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 2.5rem;
      font-family: inherit;
      font-size: 1.15rem;
      font-weight: 500;
      color: #ffffff;
      background: #0f172a;
      /* Solid dark elegant color */
      border: none;
      border-radius: 99px;
      /* Pill shape */
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.2s ease;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.15);
      outline: none;
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.2);
      background: #1e293b;
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.15);
    }

    .btn:disabled {
      opacity: 0.5 !important;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #475569;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.3s forwards;
    }

    .footer a {
      color: #475569;
      text-decoration: none;
      border-bottom: 1px dotted #cbd5e1;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .footer a:hover {
      color: #0f172a;
      border-color: #94a3b8;
    }

    .toggle-link {
      cursor: pointer;
      user-select: none;
    }

    .about-text {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease;
      opacity: 0;
      margin-top: 0;
      line-height: 1.6;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .about-text.expanded {
      max-height: 200px;
      opacity: 1;
      margin-top: 0.75rem;
    }

    .about-text a {
      color: #475569;
      border-bottom: 1px dotted #cbd5e1;
      padding-bottom: 1px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .about-text a:hover {
      color: #0f172a;
      border-color: #94a3b8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <button id="random-btn" class="btn" disabled>
    Loading...
  </button>

  <footer class="footer">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe7YT2gvY1QTQIc90b4HEurXLX9z-rWnVLz_xFiK9WQ02rE3A/viewform?usp=publish-editor"
      target="_blank" rel="noopener">Submit a blog</a> &middot; <a id="about-toggle" class="toggle-link" role="button"
      tabindex="0">What is this?</a>
    <p id="about-text" class="about-text">
      Clicking the button will take you to a random blog that is sourced from <a
        href="https://refactoringenglish.com/tools/hn-popularity" target="_blank" rel="noopener">the HackerNews Popularity Contest</a>. Take a spin or learn more about this website <a
        href="https://www.mildlyjournaling.com/posts/anyblog-the-roulette-to-discover-new-blogs/" target="_blank"
        rel="noopener">here</a>.
    </p>
  </footer>

  <script>
    const btn = document.getElementById('random-btn');
    let domains = [];

    // "What is this?" toggle
    const aboutToggle = document.getElementById('about-toggle');
    const aboutText = document.getElementById('about-text');
    aboutToggle.addEventListener('click', () => {
      aboutText.classList.toggle('expanded');
      aboutToggle.textContent = aboutText.classList.contains('expanded') ? 'Close' : 'What is this?';
    });

    async function loadDomains() {
      try {
        const res = await fetch('/domains.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        domains = await res.json();

        btn.textContent = 'Anyblog';
        btn.disabled = false;
      } catch (err) {
        console.error('Failed to load domains:', err);
        btn.textContent = 'Failed to load';
      }
    }

    btn.addEventListener('click', () => {
      if (domains.length === 0) return;

      // Provide visual feedback
      const originalText = btn.textContent;
      btn.textContent = 'Finding a blog...';
      btn.style.opacity = '0.7';

      const domain = domains[Math.floor(Math.random() * domains.length)];
      window.location.href = `https://${domain}`;
    });

    // Start fetching immediately
    loadDomains();
  </script>
</body>

</html>
