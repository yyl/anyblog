name: Refresh Domain List

on:
  schedule:
    # Weekly on Mondays at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse domains
        id: refresh_domains
        run: |
          set -euo pipefail
          python3 scripts/refresh_domains.py --github-output "$GITHUB_OUTPUT"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains.json bearblog-state.json source-counts.json
          if git diff --cached --quiet; then
            echo "No changes to tracked source files, skipping commit."
          else
            git commit -m "chore: refresh domain list (${{ steps.refresh_domains.outputs.active_domains }} active, ${{ steps.refresh_domains.outputs.bearblog_new_domains }} Bear Blog new, ${{ steps.refresh_domains.outputs.removed_domains }} removed)"
            git push
          fi
