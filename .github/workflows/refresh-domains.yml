name: Refresh Domain List

on:
  schedule:
    # Weekly on Mondays at 8:00 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and parse domains
        run: |
          set -euo pipefail

          CSV_URL="https://raw.githubusercontent.com/mtlynch/hn-popularity-contest-data/master/data/domains-meta.csv"

          echo "Fetching CSV from $CSV_URL..."
          csv=$(curl -fsSL "$CSV_URL")

          # Parse: skip header, extract first column, validate domain format
          echo "$csv" \
            | tail -n +2 \
            | cut -d',' -f1 \
            | grep -E '^([a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z0-9][a-zA-Z0-9-]{0,61}[a-zA-Z0-9]$' \
            | sort \
            | jq -R -s 'split("\n") | map(select(length > 0))' \
            > domains.json

          count=$(jq length domains.json)
          echo "Parsed $count domains"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains.json
          if git diff --cached --quiet; then
            echo "No changes to domains.json, skipping commit."
          else
            count=$(jq length domains.json)
            git commit -m "chore: refresh domain list ($count domains)"
            git push
          fi
